name: Validate-YAML-lists

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-yaml-open-concept-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML intent lists
        run: yamllint -c _config_yamllint.yml open.yml
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Fetch W3C Core concept list (for the core-overlap check)
        run: curl -sSfL -o core.yml https://raw.githubusercontent.com/w3c/mathml-docs/main/_data/core.yml
      - name: Quality gate (schema, args, arity, core-overlap, legacy, mathml shape)
        run: python3 scripts/validate_open.py open.yml --core core.yml
