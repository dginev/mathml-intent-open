---

extends: default

rules:
  braces:
    level: warning
    max-spaces-inside: 1
  brackets:
    level: warning
    max-spaces-inside: 1
  colons:
    level: warning
  commas:
    level: warning
  comments: disable
  comments-indentation: disable
  document-start: disable
  empty-lines:
    level: warning
  hyphens:
    level: warning
  indentation:
    level: warning
    indent-sequences: consistent
  # The canonical serializer intentionally emits unwrapped lines (lineWidth: 0) so editing one entry
  # never rewraps a neighbour — long mathml/url lines are by design, not lint-worthy.
  line-length: disable
  truthy: disable
  trailing-spaces: disable